[workspace]
authors = ["pranavduraisamy <pranavduraisamy@outlook.com>"]
channels = ["conda-forge"]
name = "spline-valeo"
platforms = ["win-64"]
version = "0.1.0"

[dependencies]
python = "3.14.*"
numpy = "2.4.*"
pandas = "3.0.*"
scipy = "1.17.*"
matplotlib = "3.10.*"
plotly = "6.6.*"
seaborn = "0.13.*"
statsmodels = "0.14.*"
ipython = "9.12.*"
ipykernel = "7.2.*"
nbformat = "5.10.*"
nbclient = "0.10.*"
jupyter_client = "8.8.*"
jupyter_core = "5.9.*"
pyyaml = "6.0.*"
joblib = "1.5.*"
jupyterlab = ">=4.6.0,<5"

[pypi-dependencies]
pyelastica = "==0.3.3.post2"
cma = "==4.4.4"
numba = "==0.65.0"
tqdm = "==4.67.3"
flake8 = "==7.3.0"
mypy = "==1.20.1"
mypy-extensions = "==1.1.0"
pathspec = "==1.0.4"
pycodestyle = "==2.14.0"
pyflakes = "==3.4.0"

[tasks]
jupyter = "jupyter lab"
